name: school_management
description: School Management System - Frontend App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Networking
  http: ^1.2.0
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # Navigation
  go_router: ^14.2.0
  
  # UI
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  
  # Icons & Visuals
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2720.5
  
  # Date Picker
  syncfusion_flutter_datepicker: ^27.1.50
  
  # Intl / Date Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
