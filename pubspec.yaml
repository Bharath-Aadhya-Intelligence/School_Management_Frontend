name: school_management
description: School Management System - Frontend App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Networking
  http: ^1.2.0
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # Navigation
  go_router: ^17.2.0
  
  # UI
  google_fonts: ^8.0.2
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  
  # Icons & Visuals
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2720.5
  
  # Date Picker
  syncfusion_flutter_datepicker: ^33.1.46
  
  # Intl / Date Formatting
  intl: ^0.20.2
  
  # File & Sharing
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  share_plus: ^10.0.0
  permission_handler: ^12.0.1
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/App_Logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21 # android >= 5.0
